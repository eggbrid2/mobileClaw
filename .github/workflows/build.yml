name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Chaquopy build Python
        run: echo "CHAQUOPY_BUILD_PYTHON=$(command -v python3.11 || command -v python3)" >> "$GITHUB_ENV"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobileclaw-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref_type == 'tag'
    needs: build
    env:
      KEYSTORE_AVAILABLE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Chaquopy build Python
        run: echo "CHAQUOPY_BUILD_PYTHON=$(command -v python3.11 || command -v python3)" >> "$GITHUB_ENV"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Sign APK
        if: env.KEYSTORE_AVAILABLE == 'true'
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Collect release APK
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          if [ -n "${{ steps.sign.outputs.signedReleaseFile }}" ] && [ -f "${{ steps.sign.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign.outputs.signedReleaseFile }}" "release-artifacts/mobileclaw-${GITHUB_REF_NAME}-signed.apk"
          fi
          find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" -print0 \
            | while IFS= read -r -d '' apk; do
                base="$(basename "$apk" .apk)"
                if [ ! -f "release-artifacts/mobileclaw-${GITHUB_REF_NAME}-signed.apk" ] || [[ "$base" != *signed* ]]; then
                  cp "$apk" "release-artifacts/mobileclaw-${GITHUB_REF_NAME}-${base}.apk"
                fi
              done
          test -n "$(find release-artifacts -name '*.apk' -print -quit)"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobileclaw-release-${{ github.ref_name }}
          path: release-artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
