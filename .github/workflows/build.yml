name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Chaquopy build Python
        run: echo "CHAQUOPY_BUILD_PYTHON=$(command -v python3.11 || command -v python3)" >> "$GITHUB_ENV"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobileclaw-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref_type == 'tag'
    needs: build
    env:
      RELEASE_SIGNING_READY: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEY_ALIAS != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export Chaquopy build Python
        run: echo "CHAQUOPY_BUILD_PYTHON=$(command -v python3.11 || command -v python3)" >> "$GITHUB_ENV"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Require release signing secrets
        if: env.RELEASE_SIGNING_READY != 'true'
        run: |
          echo "Release tags must be signed. Configure KEYSTORE_BASE64, KEY_ALIAS, KEYSTORE_PASSWORD, and KEY_PASSWORD repository secrets."
          exit 1

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Sign APK
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -n "$build_tools"

          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          aligned_apk="$RUNNER_TEMP/mobileclaw-${GITHUB_REF_NAME}-aligned.apk"
          signed_apk="$RUNNER_TEMP/mobileclaw-${GITHUB_REF_NAME}-signed.apk"
          keystore_file="$RUNNER_TEMP/mobileclaw-release.jks"

          test -f "$unsigned_apk"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"
          "$build_tools/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools/apksigner" sign \
            --ks "$keystore_file" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$signed_apk" \
            "$aligned_apk"
          echo "signedReleaseFile=$signed_apk" >> "$GITHUB_OUTPUT"

      - name: Collect release APK
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          signed_apk="${{ steps.sign.outputs.signedReleaseFile }}"
          if [ -z "$signed_apk" ] || [ ! -f "$signed_apk" ]; then
            echo "Signing did not produce an APK; refusing to publish an unsigned release artifact."
            exit 1
          fi
          cp "$signed_apk" "release-artifacts/mobileclaw-${GITHUB_REF_NAME}-signed.apk"

      - name: Verify release APK signature
        run: |
          set -euo pipefail
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          test -n "$apksigner"
          "$apksigner" verify --verbose "release-artifacts/mobileclaw-${GITHUB_REF_NAME}-signed.apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobileclaw-release-${{ github.ref_name }}
          path: release-artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
